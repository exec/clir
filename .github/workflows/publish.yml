name: Publish to PyPI

# Publishes the `pyclir` distribution to PyPI when a version tag is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   add a "pending publisher" with
#     PyPI project name: pyclir
#     owner:             exec
#     repository:        clir
#     workflow:          publish.yml
# After the first successful run the project exists and the publisher is live.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PROJ=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "git tag = v$TAG | pyproject.toml = $PROJ"
          if [ "$TAG" != "$PROJ" ]; then
            echo "::error::Tag v$TAG does not match pyproject.toml version $PROJ — bump pyproject.toml before tagging."
            exit 1
          fi
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
